<!DOCTYPE html>
<html>
<head>
<title>MyTradeStock</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

.positive{
color:#2ea3ff;
}

.negative{
color:#ff3b3b;
}

.stock{
margin-top:8px;
}
</style>

</head>

<body>

<h1>📈 MyTradeStock V1</h1>

<h2>실시간 뉴스</h2>

<div id="news"></div>

<h2>주식 목록</h2>

<div id="stocks"></div>

<script>

const news = [
{company:"삼성전자",title:"AI 반도체 투자 확대",sentiment:"positive"},
{company:"카카오",title:"실적 감소 우려",sentiment:"negative"},
{company:"NAVER",title:"검색 매출 증가",sentiment:"positive"},
{company:"LG화학",title:"배터리 수주 증가",sentiment:"positive"}
]

const stocks = [
{name:"삼성전자",price:"72000원"},
{name:"SK하이닉스",price:"145000원"},
{name:"NAVER",price:"210000원"},
{name:"카카오",price:"52000원"}
]

const newsBox = document.getElementById("news")

news.forEach(n=>{
const div=document.createElement("div")
div.className=n.sentiment
div.innerText=n.company+" : "+n.title
newsBox.appendChild(div)
})

const stockBox=document.getElementById("stocks")

stocks.forEach(s=>{
const div=document.createElement("div")
div.className="stock"
div.innerText=s.name+" "+s.price
stockBox.appendChild(div)
})

</script>

</body>
