<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MystockAI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.section{
margin-bottom:40px;
}

.stock{
padding:10px;
margin-bottom:10px;
background:#1e293b;
border-radius:8px;
}

.price{
color:#38bdf8;
font-weight:bold;
}

.reason{
color:#94a3b8;
font-size:14px;
margin-top:5px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:20px;
}

</style>
</head>

<body>

<h1>🤖 MystockAI</h1>

<div class="section">

<h2>🔎 주식 검색</h2>

<input id="search" placeholder="종목 검색 (예: AAPL)">

<div id="searchResult"></div>

</div>


<div class="section">

<h2>🚀 오늘 AI 추천 TOP10</h2>

<div id="aiStocks"></div>

</div>

<script>

const stocks = [

{name:"AAPL",price:182,reason:"아이폰 매출 성장 기대"},
{name:"NVDA",price:905,reason:"AI 데이터센터 GPU 수요 급증"},
{name:"MSFT",price:420,reason:"클라우드 AI 성장"},
{name:"AMD",price:170,reason:"AI 서버 CPU 시장 확대"},
{name:"AMZN",price:178,reason:"AWS 성장"},
{name:"META",price:495,reason:"AI 광고 시스템 확대"},
{name:"TSLA",price:210,reason:"로보택시 기대"},
{name:"AVGO",price:1320,reason:"AI 반도체 수요"},
{name:"NFLX",price:610,reason:"구독자 증가"},
{name:"GOOGL",price:152,reason:"AI 검색 수익 확대"}

]

const box = document.getElementById("aiStocks")

stocks.forEach(s=>{

let div = document.createElement("div")

div.className="stock"

div.innerHTML=`

<strong>${s.name}</strong>
<br>
<span class="price">$${s.price}</span>

<div class="reason">
AI 분석: ${s.reason}
</div>

`

box.appendChild(div)

})



const search = document.getElementById("search")

search.addEventListener("keyup",()=>{

let keyword = search.value.toUpperCase()

let result = stocks.filter(s=>s.name.includes(keyword))

const box = document.getElementById("searchResult")

box.innerHTML=""

result.forEach(s=>{

let div=document.createElement("div")

div.className="stock"

div.innerHTML=`

<strong>${s.name}</strong>
<br>
<span class="price">$${s.price}</span>

<div class="reason">
AI 분석: ${s.reason}
</div>

`

box.appendChild(div)

})

})

</script>

</body>
</html>
