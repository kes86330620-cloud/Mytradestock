<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>MyTradeStock V1</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    .positive {
      color: #2ea3ff;
      font-weight: bold;
    }
    .negative {
      color: #ff3b3b;
      font-weight: bold;
    }
    .item {
      margin-bottom: 8px;
    }
  </style>
</head>

<body>

  <h1>📈 MyTradeStock V1</h1>

  <h2>📰 뉴스</h2>
  <div id="news-container"></div>

  <h2>💹 주식</h2>
  <div id="stocks-container"></div>

  <script>
    const news = [
      {company:"삼성전자", title:"AI 반도체 투자 확대", sentiment:"positive"},
      {company:"카카오", title:"실적 감소 우려", sentiment:"negative"},
      {company:"NAVER", title:"검색 매출 증가", sentiment:"positive"},
      {company:"LG전자", title:"전기차 배터리 생산 확대", sentiment:"positive"},
      {company:"현대자동차", title:"전기차 판매 호조", sentiment:"positive"},
      {company:"셀트리온", title:"신약 임상 성공", sentiment:"positive"},
      {company:"SK텔레콤", title:"5G 투자 확대", sentiment:"positive"},
      {company:"카카오뱅크", title:"대출 증가, 수익 호전", sentiment:"positive"},
      {company:"한화솔루션", title:"원자재 가격 상승 영향", sentiment:"negative"}
    ];

    const stocks = [
      {name:"삼성전자", price:"72,000원"},
      {name:"SK하이닉스", price:"145,000원"},
      {name:"NAVER", price:"210,000원"},
      {name:"카카오", price:"52,000원"},
      {name:"LG전자", price:"88,000원"},
      {name:"현대자동차", price:"230,000원"},
      {name:"셀트리온", price:"250,000원"},
      {name:"SK텔레콤", price:"55,000원"},
      {name:"카카오뱅크", price:"35,000원"},
      {name:"한화솔루션", price:"45,000원"}
    ];

    const newsContainer = document.getElementById("news-container");
    news.forEach(item => {
      let div = document.createElement("div");
      div.className = "item " + (item.sentiment === "positive" ? "positive" : "negative");
      div.textContent = `${item.company} : ${item.title}`;
      newsContainer.appendChild(div);
    });

    const stockContainer = document.getElementById("stocks-container");
    stocks.forEach(stock => {
      let div = document.createElement("div");
      div.className = "item";
      div.textContent = `${stock.name} ${stock.price}`;
      stockContainer.appendChild(div);
    });
  </script>

</body>
</html>
