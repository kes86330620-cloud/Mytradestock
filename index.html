<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>MystockAI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:30px;
}

h1{text-align:center;}

.stock{
background:#1e293b;
padding:12px;
margin-bottom:10px;
border-radius:8px;
}

.name{font-size:18px;font-weight:bold;}
.price{color:#38bdf8;}
.up{color:#22c55e;}
.down{color:#ef4444;}

button{
margin-top:20px;
padding:10px;
width:100%;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🤖 MystockAI</h1>

<div id="stocks">데이터 불러오는 중...</div>

<button onclick="loadStocks()">다시 불러오기</button>

<script>

const API_KEY="DSY41UQE7EYGC23C"

const symbols=[
"AAPL","MSFT","NVDA","AMD","AMZN",
"GOOGL","META","TSLA","AVGO","NFLX"
]

function sleep(ms){
return new Promise(resolve=>setTimeout(resolve,ms))
}

async function loadStocks(){

let list=[]

const box=document.getElementById("stocks")
box.innerHTML="불러오는 중..."

for(const symbol of symbols){

try{

const res=await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${API_KEY}`)
const data=await res.json()

if(data.c){

list.push({
symbol:symbol,
price:data.c,
change:data.dp
})

}

}catch(e){}

await sleep(500) // 🔥 핵심 (속도 제한)

}

list.sort((a,b)=>b.change-a.change)

const top=list.slice(0,10)

box.innerHTML=""

top.forEach(s=>{

let color=s.change>=0?"up":"down"

let div=document.createElement("div")

div.className="stock"

div.innerHTML=`
<div class="name">${s.symbol}</div>
<div class="price">$${s.price}</div>
<div class="${color}">${s.change.toFixed(2)}%</div>
`

box.appendChild(div)

})

}

loadStocks()

</script>

</body>
</html>
