<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>MystockAI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.section{
margin-bottom:40px;
}

.stock{
background:#1e293b;
padding:12px;
margin-bottom:10px;
border-radius:8px;
}

.price{
color:#38bdf8;
font-weight:bold;
}

.change{
font-weight:bold;
margin-left:8px;
}

.up{
color:#22c55e;
}

.down{
color:#ef4444;
}

.score{
color:#fbbf24;
font-size:13px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:20px;
}

</style>

</head>


<body>

<h1>🤖 MystockAI</h1>


<div class="section">

<h2>🚀 AI 추천 TOP10</h2>

<div id="topStocks"></div>

</div>



<div class="section">

<h2>📊 전체 분석 종목</h2>

<div id="allStocks"></div>

</div>



<div class="section">

<h2>🔎 종목 검색</h2>

<input id="search" placeholder="종목 검색 (예: NVDA)">

<div id="searchResult"></div>

</div>



<script>

const API_KEY = "DSY41UQE7EYGC23C"


const symbols = [

"AAPL","MSFT","NVDA","AMD","AMZN",
"GOOGL","META","TSLA","AVGO","NFLX",
"INTC","ADBE","CSCO","QCOM","TXN",
"PYPL","AMAT","MU","LRCX","KLAC",
"ORCL","CRM","IBM","NOW","SHOP",
"SQ","UBER","LYFT","SNOW","PLTR",
"COIN","ZM","DOCU","ROKU","SPOT",
"DDOG","NET","OKTA","ZS","CRWD",
"TEAM","WDAY","ANET","PANW","MDB",
"FTNT","FSLY","BIDU","PDD","JD"

]

let stockData = []


async function loadStocks(){

stockData=[]

for(const symbol of symbols){

try{

const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${API_KEY}`)

const data = await res.json()

const price = data.c
const change = data.dp

const score = Math.round((change + 5) * 10)

stockData.push({

name:symbol,
price:price,
change:change,
score:score

})

}catch(e){

console.log(e)

}

}

render()

}



function render(){

stockData.sort((a,b)=>b.change-a.change)

const top10 = stockData.slice(0,10)

const topBox = document.getElementById("topStocks")

topBox.innerHTML=""

top10.forEach(s=>{

let color = s.change>=0 ? "up":"down"

let div=document.createElement("div")

div.className="stock"

div.innerHTML=`

<strong>${s.name}</strong>

<br>

<span class="price">$${s.price}</span>

<span class="change ${color}">
${s.change.toFixed(2)}%
</span>

<div class="score">
AI 점수 : ${s.score}
</div>

`

topBox.appendChild(div)

})



const allBox = document.getElementById("allStocks")

allBox.innerHTML=""

stockData.forEach(s=>{

let color = s.change>=0 ? "up":"down"

let div=document.createElement("div")

div.className="stock"

div.innerHTML=`

<strong>${s.name}</strong>

<span class="price">$${s.price}</span>

<span class="change ${color}">
${s.change.toFixed(2)}%
</span>

`

allBox.appendChild(div)

})

}



loadStocks()



setInterval(loadStocks,60000)



const search = document.getElementById("search")

search.addEventListener("keyup",()=>{

const keyword = search.value.toUpperCase()

const result = stockData.filter(s=>s.name.includes(keyword))

const box = document.getElementById("searchResult")

box.innerHTML=""

result.forEach(s=>{

let color = s.change>=0 ? "up":"down"

let div=document.createElement("div")

div.className="stock"

div.innerHTML=`

<strong>${s.name}</strong>

<span class="price">$${s.price}</span>

<span class="change ${color}">
${s.change.toFixed(2)}%
</span>

`

box.appendChild(div)

})

})

</script>

</body>
</html>
