<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTradeStock</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

h1{
text-align:center;
}

.stock{
margin:12px 0;
font-size:18px;
}

.up{
color:#2ea3ff;
}

.down{
color:#ff3b3b;
}

</style>

</head>

<body>

<h1>📈 MyTradeStock</h1>

<div id="stocks">주식 불러오는 중...</div>

<script>

const API_KEY = "DSY41UQE7EYGC23C";

const stocks = [
{symbol:"AAPL", name:"Apple"},
{symbol:"TSLA", name:"Tesla"},
{symbol:"NVDA", name:"NVIDIA"}
];

async function loadStocks(){

let html="";

for(let stock of stocks){

let url=`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${stock.symbol}&apikey=${API_KEY}`;

let res = await fetch(url);
let data = await res.json();

if(!data["Global Quote"]){
html += `<div class="stock">데이터 오류</div>`;
continue;
}

let price = data["Global Quote"]["05. price"];
let change = data["Global Quote"]["09. change"];

let className = change >= 0 ? "up" : "down";

html+=`
<div class="stock ${className}">
${stock.name} : ${price} (${change})
</div>
`;

}

document.getElementById("stocks").innerHTML=html;

}

loadStocks();

</script>

</body>
</html>
