<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTradeStock V1</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

h1{
text-align:center;
}

.stock{
margin:10px 0;
font-size:18px;
}

.up{
color:#2ea3ff;
}

.down{
color:#ff3b3b;
}
</style>

</head>

<body>

<h1>📈 MyTradeStock V1</h1>

<h2>주식 정보</h2>

<div id="stocks">데이터 불러오는 중...</div>

<script>

const stocks = [
{name:"삼성전자", price:72000, change:1200},
{name:"SK하이닉스", price:145000, change:-800},
{name:"NAVER", price:210000, change:500}
];

let html = "";

for(let stock of stocks){

let className = stock.change >= 0 ? "up" : "down";

html += `
<div class="stock ${className}">
${stock.name} : ${stock.price.toLocaleString()} (${stock.change})
</div>
`;

}

document.getElementById("stocks").innerHTML = html;

</script>

</body>
</html>
