<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>MystockAI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:30px;
}

h1{
text-align:center;
}

.subtitle{
text-align:center;
color:#94a3b8;
margin-bottom:20px;
}

.stock{
background:#1e293b;
padding:12px;
margin-bottom:10px;
border-radius:8px;
}

.name{
font-size:18px;
font-weight:bold;
}

.price{
color:#38bdf8;
}

.up{
color:#22c55e;
}

.down{
color:#ef4444;
}

button{
margin-top:20px;
padding:10px;
width:100%;
background:#38bdf8;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🤖 MystockAI</h1>

<div class="subtitle">
실제 시장 데이터 기반 참고 추천
</div>

<div id="stocks">데이터 불러오는 중...</div>

<button onclick="loadStocks()">새로 불러오기</button>

<script>

const API_KEY="DSY41UQE7EYGC23C"

const symbols=[
"AAPL","MSFT","NVDA","AMD","AMZN",
"GOOGL","META","TSLA","AVGO","NFLX",
"INTC","ADBE","CSCO","QCOM","PYPL",
"AMAT","MU","LRCX","ORCL","CRM"
]

async function loadStocks(){

let list=[]

for(const symbol of symbols){

try{

const res=await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${API_KEY}`)

const data=await res.json()

if(!data.c) continue

list.push({
symbol:symbol,
price:data.c,
change:data.dp
})

}catch(e){}

}

list.sort((a,b)=>b.change-a.change)

const top=list.slice(0,10)

const box=document.getElementById("stocks")

box.innerHTML=""

top.forEach(s=>{

let color=s.change>=0?"up":"down"

let div=document.createElement("div")

div.className="stock"

div.innerHTML=`

<div class="name">${s.symbol}</div>

<div class="price">$${s.price}</div>

<div class="${color}">
${s.change.toFixed(2)}%
</div>

`

box.appendChild(div)

})

}

loadStocks()

</script>

</body>
</html>
