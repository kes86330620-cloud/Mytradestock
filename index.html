<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MystockAI</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:30px;
}

h1{
font-size:36px;
}

button{
padding:12px 20px;
background:#3b82f6;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}

.stock{
background:#1e293b;
padding:15px;
margin-top:15px;
border-radius:10px;
}

.reason{
color:#94a3b8;
margin-top:5px;
}

</style>
</head>

<body>

<h1>📈 MystockAI</h1>

<h2>오늘 AI 추천 주식</h2>

<button onclick="generate()">AI 추천 생성</button>

<div id="list"></div>

<script>

const stocks=[
{name:"NVIDIA",reason:"AI 반도체 수요 증가"},
{name:"Microsoft",reason:"클라우드 성장 지속"},
{name:"Tesla",reason:"전기차 시장 반등 기대"},
{name:"Amazon",reason:"이커머스 매출 증가"},
{name:"Meta",reason:"AI 광고 성장"},
{name:"AMD",reason:"AI 칩 경쟁력 상승"},
{name:"Apple",reason:"아이폰 판매 안정"},
{name:"Netflix",reason:"콘텐츠 성장"},
{name:"Google",reason:"AI 검색 시장 확대"},
{name:"Palantir",reason:"정부 AI 계약 증가"},
{name:"Snowflake",reason:"데이터 플랫폼 성장"},
{name:"CrowdStrike",reason:"사이버보안 수요 증가"},
{name:"Shopify",reason:"이커머스 플랫폼 성장"},
{name:"Coinbase",reason:"암호화폐 거래 증가"},
{name:"Uber",reason:"모빌리티 성장"}
];

function generate(){

let shuffled=[...stocks].sort(()=>0.5-Math.random());

let top=shuffled.slice(0,10);

let box=document.getElementById("list");

box.innerHTML="";

top.forEach((s,i)=>{

let div=document.createElement("div");

div.className="stock";

div.innerHTML=`
<b>${i+1}. ${s.name}</b>
<div class="reason">${s.reason}</div>
`;

box.appendChild(div);

});

}

generate();

</script>

</body>
</html>
