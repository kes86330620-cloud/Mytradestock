<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MystockAI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.update{
text-align:center;
font-size:13px;
color:#94a3b8;
margin-bottom:25px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab{
padding:10px 20px;
background:#1e293b;
cursor:pointer;
border-radius:6px;
}

.tab.active{
background:#38bdf8;
color:black;
}

.section{
margin-bottom:40px;
}

.stock{
background:#1e293b;
padding:12px;
margin-bottom:10px;
border-radius:8px;
}

.price{
color:#38bdf8;
font-weight:bold;
}

.change{
margin-left:8px;
font-weight:bold;
}

.up{color:#22c55e;}
.down{color:#ef4444;}

.score{
color:#fbbf24;
font-size:13px;
}

.reason{
font-size:12px;
color:#94a3b8;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:20px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<h1>🤖 MystockAI</h1>
<div id="updateTime" class="update"></div>

<div class="tabs">
<div class="tab active" onclick="showTab('us')">미국 주식</div>
<div class="tab" onclick="showTab('kr')">한국 주식</div>
</div>

<div id="us">

<div class="section">
<h2>🚀 AI 추천 TOP10</h2>
<div id="topStocks"></div>
</div>

<div class="section">
<h2>📊 전체 분석 종목</h2>
<div id="allStocks"></div>
</div>

</div>

<div id="kr" class="hidden">
<h2>한국주식 분석 (준비중)</h2>
</div>

<div class="section">

<h2>🔎 종목 검색</h2>

<input id="search" placeholder="종목 검색 (예: NVDA)">

<div id="searchResult"></div>

</div>

<script>

const API_KEY="DSY41UQE7EYGC23C"

const symbols=[
"AAPL","MSFT","NVDA","AMD","AMZN",
"GOOGL","META","TSLA","AVGO","NFLX",
"INTC","ADBE","CSCO","QCOM","TXN",
"PYPL","AMAT","MU","LRCX","KLAC",
"ORCL","CRM","IBM","NOW","SHOP",
"SQ","UBER","LYFT","SNOW","PLTR",
"COIN","ZM","DOCU","ROKU","SPOT",
"DDOG","NET","OKTA","ZS","CRWD",
"TEAM","WDAY","ANET","PANW","MDB",
"FTNT","FSLY","BIDU","PDD","JD"
]

let stockData=[]

async function loadStocks(){

stockData=[]

for(let i=0;i<symbols.length;i++){

const symbol=symbols[i]

try{

const res=await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${API_KEY}`)

const data=await res.json()

const price=data.c
const change=data.dp

if(price==0) continue

const score=Math.round((change+5)*10)

let reason="시장 흐름 관망"

if(change>2) reason="상승 모멘텀 발생"
if(change>5) reason="강한 매수세 감지"
if(change<-2) reason="단기 하락 압력"

stockData.push({
name:symbol,
price:price,
change:change,
score:score,
reason:reason
})

}catch(e){
console.log(symbol,e)
}

}

render()
updateTime()

}

function render(){

stockData.sort((a,b)=>b.change-a.change)

const top10=stockData.slice(0,10)

const topBox=document.getElementById("topStocks")
topBox.innerHTML=""

top10.forEach(s=>{

const color=s.change>=0?"up":"down"

const div=document.createElement("div")
div.className="stock"

div.innerHTML=`
<strong>${s.name}</strong><br>
<span class="price">$${s.price}</span>
<span class="change ${color}">${s.change.toFixed(2)}%</span>
<div class="score">AI 점수 : ${s.score}</div>
<div class="reason">AI 분석 : ${s.reason}</div>
`

topBox.appendChild(div)

})

const allBox=document.getElementById("allStocks")
allBox.innerHTML=""

stockData.forEach(s=>{

const color=s.change>=0?"up":"down"

const div=document.createElement("div")
div.className="stock"

div.innerHTML=`
<strong>${s.name}</strong>
<span class="price">$${s.price}</span>
<span class="change ${color}">${s.change.toFixed(2)}%</span>
`

allBox.appendChild(div)

})

}

function updateTime(){

const now=new Date()

document.getElementById("updateTime").innerText=
"마지막 업데이트 : "+now.toLocaleTimeString()

}

function showTab(tab){

document.getElementById("us").classList.add("hidden")
document.getElementById("kr").classList.add("hidden")

document.getElementById(tab).classList.remove("hidden")

}

loadStocks()

setInterval(loadStocks,120000)

const search=document.getElementById("search")

search.addEventListener("keyup",()=>{

const keyword=search.value.toUpperCase()

const result=stockData.filter(s=>s.name.includes(keyword))

const box=document.getElementById("searchResult")

box.innerHTML=""

result.forEach(s=>{

const color=s.change>=0?"up":"down"

const div=document.createElement("div")

div.className="stock"

div.innerHTML=`
<strong>${s.name}</strong>
<span class="price">$${s.price}</span>
<span class="change ${color}">${s.change.toFixed(2)}%</span>
<div class="reason">${s.reason}</div>
`

box.appendChild(div)

})

})

</script>

</body>
</html>
