<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTradeStock V1</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

h1{
text-align:center;
}

.stock{
margin:10px 0;
font-size:18px;
}

.up{
color:#2ea3ff;
}

.down{
color:#ff3b3b;
}

</style>

</head>

<body>

<h1>📈 MyTradeStock V1</h1>

<h2>실시간 주식</h2>

<div id="stocks"></div>

<script>

const stocks = [
{symbol:"005930.KS", name:"삼성전자"},
{symbol:"000660.KS", name:"SK하이닉스"},
{symbol:"035420.KS", name:"NAVER"}
];

async function loadStocks(){

let container = document.getElementById("stocks");
container.innerHTML = "불러오는 중...";

let html = "";

for(let stock of stocks){

let url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${stock.symbol}`;

let res = await fetch(url);
let data = await res.json();

let price = data.quoteResponse.result[0].regularMarketPrice;
let change = data.quoteResponse.result[0].regularMarketChange;

let className = change >= 0 ? "up" : "down";

html += `<div class="stock ${className}">
${stock.name} : ${price} (${change.toFixed(2)})
</div>`;

}

container.innerHTML = html;

}

loadStocks();

</script>

</body>
</html>
