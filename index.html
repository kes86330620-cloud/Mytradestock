<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Stock Dashboard</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
margin:20px;
}

h2{
margin-top:40px;
}

.stock{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

.price-up{
color:#22c55e;
}

.price-down{
color:#ef4444;
}

.chart{
display:none;
margin-top:10px;
}
</style>

<script src="https://s3.tradingview.com/tv.js"></script>
</head>

<body>

<h1>📈 My Stock Dashboard</h1>

<h2>시장 요약</h2>
<div id="market"></div>

<h2>🔥 상승률 TOP</h2>
<div id="gainers"></div>

<h2>📉 하락률 TOP</h2>
<div id="losers"></div>

<h2>🇺🇸 미국 주식</h2>
<div id="us-stocks"></div>

<h2>🇰🇷 한국 주식</h2>
<div id="kr-stocks"></div>

<script>

const usStocks = [
"AAPL","MSFT","NVDA","AMZN","GOOGL",
"META","TSLA","AMD","NFLX","INTC"
];

const krStocks = [
"005930","000660","035420","051910","006400",
"068270","207940","035720","028260","105560"
];

function loadStocks(){

const usDiv = document.getElementById("us-stocks");
const krDiv = document.getElementById("kr-stocks");

usDiv.innerHTML="";
krDiv.innerHTML="";

usStocks.forEach(symbol=>{

const stock = document.createElement("div");
stock.className="stock";

stock.innerHTML=`
${symbol}
<div class="chart" id="chart-${symbol}"></div>
`;

stock.onclick=()=>toggleChart(symbol,"NASDAQ");

usDiv.appendChild(stock);

});

krStocks.forEach(symbol=>{

const stock=document.createElement("div");
stock.className="stock";

stock.innerHTML=`
${symbol}
<div class="chart" id="chart-${symbol}"></div>
`;

stock.onclick=()=>toggleChart(symbol,"KRX");

krDiv.appendChild(stock);

});

}

function toggleChart(symbol,exchange){

const chart=document.getElementById("chart-"+symbol);

if(chart.style.display==="block"){
chart.style.display="none";
chart.innerHTML="";
return;
}

chart.style.display="block";

new TradingView.widget({
container_id:"chart-"+symbol,
width:"100%",
height:300,
symbol:exchange+":"+symbol,
interval:"D",
theme:"dark",
style:"1",
locale:"kr"
});

}

loadStocks();

/* 30초 자동 새로고침 */
setInterval(loadStocks,30000);

</script>

</body>
</html>
