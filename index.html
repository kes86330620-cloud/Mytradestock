<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stock Dashboard</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

h1{
margin-bottom:30px;
}

h2{
margin-top:40px;
}

.stock{
background:#1e293b;
padding:12px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
}

.price{
float:right;
font-weight:bold;
}

.chart{
display:none;
margin-top:10px;
}

</style>
</head>


<body>

<h1>📈 My Stock Dashboard</h1>

<h2>🇺🇸 US Stocks</h2>
<div id="us"></div>

<h2>🇰🇷 Korea Stocks</h2>
<div id="kr"></div>


<script>

const usStocks=[
{name:"Apple",symbol:"NASDAQ:AAPL"},
{name:"Microsoft",symbol:"NASDAQ:MSFT"},
{name:"Nvidia",symbol:"NASDAQ:NVDA"},
{name:"Tesla",symbol:"NASDAQ:TSLA"},
{name:"Amazon",symbol:"NASDAQ:AMZN"},
{name:"Google",symbol:"NASDAQ:GOOGL"},
{name:"Meta",symbol:"NASDAQ:META"},
{name:"AMD",symbol:"NASDAQ:AMD"},
{name:"Netflix",symbol:"NASDAQ:NFLX"},
{name:"Intel",symbol:"NASDAQ:INTC"}
];


const krStocks=[
{name:"삼성전자",symbol:"KRX:005930"},
{name:"SK하이닉스",symbol:"KRX:000660"},
{name:"NAVER",symbol:"KRX:035420"},
{name:"LG화학",symbol:"KRX:051910"},
{name:"삼성SDI",symbol:"KRX:006400"},
{name:"셀트리온",symbol:"KRX:068270"},
{name:"삼성바이오로직스",symbol:"KRX:207940"},
{name:"카카오",symbol:"KRX:035720"},
{name:"삼성물산",symbol:"KRX:028260"},
{name:"KB금융",symbol:"KRX:105560"}
];


function createStockList(list,container){

list.forEach(stock=>{

const div=document.createElement("div");

div.className="stock";

div.innerHTML=`

<span>${stock.name}</span>

<span class="price">
<iframe 
src="https://s.tradingview.com/widgetembed/?symbol=${stock.symbol}&interval=1&hide_top_toolbar=true&hide_legend=true&theme=dark&style=2"
width="120"
height="30"
frameborder="0">
</iframe>
</span>

<div class="chart" id="${stock.symbol}"></div>

`;

div.onclick=()=>toggleChart(stock.symbol);

document.getElementById(container).appendChild(div);

});

}



function toggleChart(symbol){

const chart=document.getElementById(symbol);

if(chart.style.display==="block"){
chart.style.display="none";
chart.innerHTML="";
return;
}

chart.style.display="block";

chart.innerHTML=`

<iframe
width="100%"
height="420"
src="https://s.tradingview.com/widgetembed/?symbol=${symbol}&interval=D&theme=dark"
frameborder="0">
</iframe>

`;

}



createStockList(usStocks,"us");
createStockList(krStocks,"kr");

</script>

</body>
</html>
