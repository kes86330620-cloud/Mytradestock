<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>MystockAI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:30px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#94a3b8;
margin-bottom:30px;
}

.stock{
background:#1e293b;
padding:12px;
margin-bottom:10px;
border-radius:8px;
}

.name{
font-size:18px;
font-weight:bold;
}

.reason{
font-size:13px;
color:#94a3b8;
margin-top:4px;
}

button{
margin-top:20px;
padding:10px;
width:100%;
background:#38bdf8;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🤖 MystockAI</h1>

<div class="subtitle">
개인 참고용 주식 추천
</div>

<div id="recommend"></div>

<button onclick="generate()">추천 다시 받기</button>

<script>

const stocks=[

{symbol:"NVDA",reason:"AI 반도체 성장"},
{symbol:"MSFT",reason:"클라우드 성장"},
{symbol:"AAPL",reason:"안정적 실적"},
{symbol:"AMZN",reason:"이커머스 + 클라우드"},
{symbol:"GOOGL",reason:"광고 시장 회복"},
{symbol:"META",reason:"AI 광고 성장"},
{symbol:"TSLA",reason:"전기차 시장 확대"},
{symbol:"AMD",reason:"데이터센터 수요"},
{symbol:"AVGO",reason:"반도체 인프라"},
{symbol:"NFLX",reason:"콘텐츠 성장"},
{symbol:"PLTR",reason:"AI 데이터 분석"},
{symbol:"SHOP",reason:"전자상거래 플랫폼"},
{symbol:"CRM",reason:"기업 소프트웨어"},
{symbol:"SNOW",reason:"데이터 클라우드"},
{symbol:"UBER",reason:"모빌리티 플랫폼"}

]

function generate(){

let shuffled=[...stocks].sort(()=>0.5-Math.random())

let pick=shuffled.slice(0,10)

const box=document.getElementById("recommend")

box.innerHTML=""

pick.forEach(s=>{

let div=document.createElement("div")

div.className="stock"

div.innerHTML=`

<div class="name">${s.symbol}</div>

<div class="reason">${s.reason}</div>

`

box.appendChild(div)

})

}

generate()

</script>

</body>
</html>
