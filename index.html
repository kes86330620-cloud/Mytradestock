<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MyTradeStock</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

h1{
text-align:center;
}

.stock{
margin:12px 0;
font-size:18px;
}

.up{
color:#2ea3ff;
}

.down{
color:#ff3b3b;
}

h2{
margin-top:40px;
}

</style>

</head>

<body>

<h1>📈 MyTradeStock</h1>

<h2>미국 주식</h2>

<div id="stocks">주식 불러오는 중...</div>

<h2>📊 Apple 차트</h2>

<div id="tradingview_chart"></div>

<script>

const API_KEY = "DSY41UQE7EYGC23C";

const stocks = [

{symbol:"AAPL", name:"Apple"},
{symbol:"TSLA", name:"Tesla"},
{symbol:"NVDA", name:"NVIDIA"}

];

async function loadStocks(){

let html = "";

for(let stock of stocks){

// API 제한 회피 딜레이
await new Promise(resolve => setTimeout(resolve,1500));

try{

let url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${stock.symbol}&apikey=${API_KEY}`;

let res = await fetch(url);

let data = await res.json();

if(!data["Global Quote"]){

html += `<div class="stock">데이터 오류</div>`;

continue;

}

let price = data["Global Quote"]["05. price"];

let change = data["Global Quote"]["09. change"];

let className = change >= 0 ? "up" : "down";

html += `
<div class="stock ${className}">
${stock.name} : ${price} (${change})
</div>
`;

}catch(error){

html += `<div class="stock">API 오류</div>`;

}

}

document.getElementById("stocks").innerHTML = html;

}

loadStocks();

</script>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

new TradingView.widget({

"width": "100%",

"height": 500,

"symbol": "NASDAQ:AAPL",

"interval": "D",

"timezone": "Etc/UTC",

"theme": "dark",

"style": "1",

"locale": "kr",

"toolbar_bg": "#111",

"enable_publishing": false,

"container_id": "tradingview_chart"

});

</script>

</body>

</html>
